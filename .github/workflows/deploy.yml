name: Deploy to Coolify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deployment
        run: |
          curl --fail -X GET \
            "https://coolify.clickbric.com/api/v1/deploy?uuid=ng8owk488wsgs000s0wkw4c8&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
